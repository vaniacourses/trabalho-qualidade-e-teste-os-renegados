<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovoBanco Investimentos Investimentos — Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f14; --surface: #111820; --border: #1f2e40;
      --gold: #c9a84c; --gold-light: #e8c97a; --text: #e8edf2;
      --muted: #6b8099; --red: #e05555; --green: #2eb87a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--gold);
    }
    .logo-text span { color: var(--text); }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
    }

    .login-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }
    .form-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus { border-color: var(--gold); }

    .btn-login {
      width: 100%;
      background: var(--gold);
      color: #0b0f14;
      border: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--gold-light); }

    .alert-error {
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="logo-text">Novo<span>Banco</span></div>
      <div class="logo-sub">Portal de Serviços Financeiros</div>
    </div>

    <div class="login-card">
      <div class="login-title">Bem-vindo de volta</div>
      <div class="login-sub">Informe suas credenciais para acessar o portal.</div>

      {% if erro %}
      <div class="alert-error">⚠ {{ erro }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" name="username" placeholder="seu.usuario" autocomplete="username" required autofocus/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" name="senha" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-login">Entrar</button>
      </form>
    </div>

    <div class="login-footer">NovoBanco Investimentos Investimentos © 2024 — Todos os direitos reservados</div>
  </div>
</body>
</html>
